# Build & publish the DALi Preview runtime image to GHCR.
#
# Triggers:
#   - Weekly cron (Monday 02:00 UTC) — picks the latest dali-toolkit tag
#   - Manual dispatch — pin exact DALI_TAG / DALI_UI_TAG
#   - Push to main affecting docker/**  — rebuild on Dockerfile change
#
# Secrets required: GITHUB_TOKEN (auto-provided), with packages:write.
# Org settings: members must be allowed to publish packages to dalihub.
#
# Image: ghcr.io/dalihub/dali-preview-runtime
#   :<DALI_TAG>          — pinned tag, kept long-term
#   :latest              — moved to the most recent successful build
#   :nightly             — moved every cron run regardless of success of previous

name: Publish runtime image

on:
  schedule:
    # 매주 월요일 02:00 UTC. UTC 기준이라 KST는 11:00.
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      dali_tag:
        description: 'dali-core/adaptor/toolkit git tag (e.g. dali_2.5.18). Empty = auto-detect latest dali_*.'
        required: false
        default: ''
      dali_ui_tag:
        description: 'dali-ui git tag (e.g. v2.5.14.10210). Empty = auto-detect latest.'
        required: false
        default: ''
      thorvg_tag:
        description: 'ThorVG (tizenvg) git tag. Empty = use Dockerfile default.'
        required: false
        default: ''
      force_rebuild:
        description: 'Rebuild even if the resolved tag image already exists in GHCR.'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-publish.yml'

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/dalihub/dali-preview-runtime

jobs:
  resolve-tags:
    name: Resolve DALi tags
    runs-on: ubuntu-latest
    outputs:
      dali_tag: ${{ steps.resolve.outputs.dali_tag }}
      dali_ui_tag: ${{ steps.resolve.outputs.dali_ui_tag }}
      should_build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: Resolve DALi tags
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_DALI_TAG: ${{ github.event.inputs.dali_tag }}
          INPUT_DALI_UI_TAG: ${{ github.event.inputs.dali_ui_tag }}
        run: |
          set -e

          # Pick latest dali_2.x.y tag (skip tizen_*_release, accepted/* etc.)
          # Page through tags because GitHub may return tizen tags first by default sort.
          if [[ -n "${INPUT_DALI_TAG}" ]]; then
            DALI_TAG="${INPUT_DALI_TAG}"
          else
            DALI_TAG=$(gh api 'repos/dalihub/dali-toolkit/tags?per_page=100' \
              --jq '[.[].name | select(startswith("dali_"))] | .[0]')
            if [[ -z "${DALI_TAG}" || "${DALI_TAG}" == "null" ]]; then
              echo "ERROR: no dali_* tag found in dali-toolkit; falling back to first tag" >&2
              DALI_TAG=$(gh api repos/dalihub/dali-toolkit/tags --jq '.[0].name')
            fi
          fi
          echo "dali_tag=${DALI_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved DALI_TAG: ${DALI_TAG}"

          if [[ -n "${INPUT_DALI_UI_TAG}" ]]; then
            DALI_UI_TAG="${INPUT_DALI_UI_TAG}"
          else
            DALI_UI_TAG=$(gh api 'repos/dalihub/dali-ui/tags?per_page=100' \
              --jq '[.[].name | select(startswith("v"))] | .[0]')
          fi
          echo "dali_ui_tag=${DALI_UI_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved DALI_UI_TAG: ${DALI_UI_TAG}"

      - name: Skip if image already exists for this tag
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DALI_TAG: ${{ steps.resolve.outputs.dali_tag }}
          FORCE: ${{ github.event.inputs.force_rebuild }}
        run: |
          set -e

          if [[ "${FORCE}" == "true" ]]; then
            echo "Force rebuild requested."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Query existing tags via the OCI registry. Anonymous unauthenticated
          # request — public package, no token needed.
          existing=$(curl -fsSL "https://ghcr.io/v2/dalihub/dali-preview-runtime/tags/list" 2>/dev/null \
            | jq -r '.tags // [] | .[]' || true)

          if echo "${existing}" | grep -Fxq "${DALI_TAG}"; then
            echo "Image ghcr.io/dalihub/dali-preview-runtime:${DALI_TAG} already exists — skipping."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-push:
    name: Build and push image
    needs: resolve-tags
    if: needs.resolve-tags.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: docker
          file: docker/Dockerfile.runtime
          build-args: |
            DALI_TAG=${{ needs.resolve-tags.outputs.dali_tag }}
            DALI_UI_TAG=${{ needs.resolve-tags.outputs.dali_ui_tag }}
            ${{ github.event.inputs.thorvg_tag && format('THORVG_TAG={0}', github.event.inputs.thorvg_tag) || '' }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.resolve-tags.outputs.dali_tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image manifest
        run: |
          docker buildx imagetools inspect \
            ${{ env.IMAGE_NAME }}:${{ needs.resolve-tags.outputs.dali_tag }}

  prune-old:
    # Keep only the most recent 12 versioned tags (~3 months of weekly releases).
    # Never prunes 'latest' / 'nightly' (these are rolling pointers).
    name: Prune old image versions
    needs: build-and-push
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/delete-package-versions@v5
        with:
          package-name: 'dali-preview-runtime'
          package-type: 'container'
          owner: 'dalihub'
          min-versions-to-keep: 12
          delete-only-untagged-versions: false
