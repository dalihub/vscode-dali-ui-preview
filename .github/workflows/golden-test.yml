name: Golden Screenshot Tests

# Renders every golden sample inside the SAME docker runtime the live preview
# uses (ghcr.io/lwc0917/dali-preview-runtime) and pixel-compares against the
# committed goldens. Runs on github-hosted runners — no self-hosted DALi SDK
# needed, because the rendering happens inside the container image. This is the
# safety net that catches extraction / codegen / render regressions (e.g. the
# non-fluent migration breakage) that the unit-test-only release CI misses.
on:
  push:
    branches: [main, autodev/auto-extract-preview]
  pull_request:
    branches: [main, autodev/auto-extract-preview]
  workflow_dispatch:

concurrency:
  group: golden-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      # The golden runner renders inside the docker image; Xvfb is only needed
      # for the `xvfb-run` wrapper in the npm script (harmless for the docker
      # path, required so the command exists).
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Pre-pull the public runtime image so the first render doesn't time out.
      - name: Pull DALi runtime image
        run: docker pull ghcr.io/lwc0917/dali-preview-runtime:latest

      - name: Run golden screenshot tests (docker render)
        run: npm run test:e2e

      - name: Upload diff and actual screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-test-diffs
          path: |
            test/e2e/diff/
            test/e2e/actual/
          if-no-files-found: ignore
          retention-days: 14
