name: Golden Screenshot Tests

# Renders every golden sample inside the SAME docker runtime the live preview
# uses (ghcr.io/lwc0917/dali-preview-runtime) and pixel-compares against the
# committed goldens. Now docker-based on github-hosted runners — no self-hosted
# DALi SDK needed (the old config required one and had been dormant since April).
#
# Trigger is workflow_dispatch (on-demand) for now, NOT push/PR. A first
# github-hosted run (v0.46.2) confirmed the extraction/codegen safety net works —
# the small deterministic samples that the non-fluent migration broke
# (zero-arg-entry, broken-image, font-scale-15) all PASS — but four large/image
# samples are not yet reliably green on github-hosted runners, for two reasons:
#   1. Render robustness: the big-canvas samples (food-delivery, crypto-portfolio,
#      fitness-dashboard) fail to render on the hosted runner (shader cache under
#      /root/.cache, and the golden runner does NOT stage local image assets the
#      way the extension's BuildRunner.stageImageAssets does, so `assets/*.jpg`
#      can't be found in the container).
#   2. Golden determinism: docker renders on the hosted runner differ a few
#      pixels from goldens captured elsewhere (weather-forecast), so a pixel gate
#      needs goldens regenerated in — and pinned to — this CI environment.
# Until those are addressed, run it manually (Actions → this workflow → Run) or
# locally (`npm run test:e2e`); don't gate every push on a flaky red.
on:
  workflow_dispatch:

concurrency:
  group: golden-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      # The golden runner renders inside the docker image; Xvfb is only needed
      # for the `xvfb-run` wrapper in the npm script (harmless for the docker
      # path, required so the command exists).
      - name: Install Xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # Pre-pull the public runtime image so the first render doesn't time out.
      - name: Pull DALi runtime image
        run: docker pull ghcr.io/lwc0917/dali-preview-runtime:latest

      - name: Run golden screenshot tests (docker render)
        run: npm run test:e2e

      - name: Upload diff and actual screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-test-diffs
          path: |
            test/e2e/diff/
            test/e2e/actual/
          if-no-files-found: ignore
          retention-days: 14
