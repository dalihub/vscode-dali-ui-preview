<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none'; img-src {{cspSource}} vscode-resource: https: data:; style-src 'unsafe-inline'; script-src 'unsafe-inline' {{cspSource}}; connect-src ws: wss:;">
<title>DALi Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1e1e1e;
    color: #cccccc;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #252526;
    border-bottom: 1px solid #3c3c3c;
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .toolbar label {
    font-size: 11px;
    color: #999;
    margin-right: 2px;
  }

  .toolbar select,
  .toolbar input[type="number"] {
    background: #3c3c3c;
    color: #cccccc;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 12px;
    outline: none;
  }

  .toolbar select:focus,
  .toolbar input[type="number"]:focus {
    border-color: #007acc;
  }

  .toolbar input[type="number"] {
    width: 70px;
  }

  .toolbar-separator {
    width: 1px;
    height: 20px;
    background: #555;
    margin: 0 4px;
    display: inline-block;
    vertical-align: middle;
  }

  .toolbar button {
    background: #3c3c3c;
    color: #cccccc;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 3px 10px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
    transition: background 0.15s;
  }

  .toolbar button:hover {
    background: #505050;
  }

  .toolbar button:active {
    background: #007acc;
  }

  .btn-refresh {
    font-size: 15px;
    padding: 2px 8px;
  }

  .btn-theme {
    font-size: 14px;
    padding: 2px 8px;
  }

  .btn-theme.theme-light {
    background: #505050;
  }

  /* ── Background color picker ── */
  .btn-bg-color {
    width: 22px;
    height: 22px;
    padding: 0;
    border-radius: 3px;
    border: 2px solid #666;
    cursor: pointer;
    flex-shrink: 0;
    outline: none;
    transition: border-color 0.15s;
  }

  .btn-bg-color:hover {
    border-color: #007acc;
  }

  .color-picker-popup {
    position: fixed;
    z-index: 100;
    background: #2d2d2d;
    border: 1px solid #555;
    border-radius: 6px;
    padding: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
    min-width: 210px;
    user-select: none;
  }

  .cp-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .cp-row label {
    font-size: 11px;
    color: #999;
    width: 14px;
    flex-shrink: 0;
  }

  .cp-native {
    width: 44px;
    height: 28px;
    border: none;
    padding: 0;
    cursor: pointer;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .cp-title {
    font-size: 11px;
    color: #aaa;
  }

  .cp-hex {
    background: #3c3c3c;
    color: #cccccc;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 3px 6px;
    font-size: 12px;
    width: 82px;
    outline: none;
    font-family: 'Cascadia Code', Consolas, monospace;
  }

  .cp-hex:focus {
    border-color: #007acc;
  }

  .cp-hex.invalid {
    border-color: #f44747;
  }

  .cp-rgb {
    background: #3c3c3c;
    color: #cccccc;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 3px 4px;
    font-size: 12px;
    width: 48px;
    outline: none;
  }

  .cp-rgb:focus {
    border-color: #007acc;
  }

  .cp-reset {
    margin-top: 8px;
    font-size: 11px;
    padding: 4px 8px;
    width: 100%;
    background: #3c3c3c;
    color: #ccc;
    border: 1px solid #555;
    border-radius: 3px;
    cursor: pointer;
  }

  .cp-reset:hover {
    background: #505050;
  }

  .custom-size-inputs {
    display: none;
    align-items: center;
    gap: 4px;
  }

  .custom-size-inputs.visible {
    display: flex;
  }

  .dim-times {
    color: #999;
    font-size: 11px;
  }

  /* ── Main preview area ── */
  .preview-area {
    flex: 1;
    position: relative;
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-container {
    position: relative;
    display: inline-block;
  }

  .preview-container img {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 90px);
    object-fit: contain;
    border: 1px solid #333;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
    transition: opacity 0.2s;
  }

  .preview-container.bg-dark { background: #1a1a2e; }
  .preview-container.bg-light { background: #ffffff; }
  .preview-container.bg-checker {
    background-image:
      linear-gradient(45deg, #444 25%, transparent 25%),
      linear-gradient(-45deg, #444 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #444 75%),
      linear-gradient(-45deg, transparent 75%, #444 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
  }

  .dimensions-label {
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #888;
    white-space: nowrap;
  }

  /* ── Resize handle ── */
  .resize-handle {
    position: absolute;
    right: -2px;
    bottom: -2px;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    z-index: 10;
  }

  .resize-handle::before {
    content: '';
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 10px 10px;
    border-color: transparent transparent #888 transparent;
  }

  .resize-handle:hover::before {
    border-color: transparent transparent #007acc transparent;
  }

  .resize-outline {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    border: 2px dashed #007acc;
    pointer-events: none;
    z-index: 5;
  }

  .resize-outline.active {
    display: block;
  }

  .resize-dimensions {
    display: none;
    position: absolute;
    background: rgba(0, 122, 204, 0.85);
    color: #fff;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    z-index: 15;
    white-space: nowrap;
  }

  .resize-dimensions.active {
    display: block;
  }

  /* ── Overlays ── */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: none;
  }

  .overlay-loading {
    background: rgba(30, 30, 30, 0.6);
  }

  .overlay-error {
    background: rgba(200, 30, 30, 0.95);
    pointer-events: auto;
    bottom: auto;
    align-items: flex-start;
    max-height: 40%;
    overflow-y: auto;
  }

  .overlay-welcome {
    pointer-events: auto;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #555;
    border-top-color: #007acc;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .error-box {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 10px 16px;
    width: 100%;
    max-height: 100%;
    overflow: auto;
    text-align: left;
    user-select: text;
    -webkit-user-select: text;
    cursor: text;
    box-sizing: border-box;
  }

  .error-box h3 {
    color: #f44747;
    margin-bottom: 8px;
    font-size: 14px;
    user-select: text;
    -webkit-user-select: text;
  }

  .error-box pre {
    color: #f48771;
    font-size: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    user-select: text;
    -webkit-user-select: text;
    cursor: text;
  }

  .welcome-box {
    text-align: center;
    color: #888;
  }

  .welcome-box h2 {
    color: #cccccc;
    font-size: 18px;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .welcome-box code {
    background: #2d2d2d;
    padding: 2px 6px;
    border-radius: 3px;
    color: #4ec9b0;
    font-size: 13px;
  }

  .hidden { display: none !important; }

  /* ── Click-to-code inspect mode ── */
  .element-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 8;
  }
  .element-overlay.interactive {
    pointer-events: auto;
    cursor: crosshair;
  }
  .element-bbox {
    position: absolute;
    border: 1px solid transparent;
    box-sizing: border-box;
    pointer-events: auto;
    cursor: pointer;
    transition: border-color 0.15s, background-color 0.15s;
  }
  .element-bbox:hover {
    border-color: rgba(0, 122, 204, 0.8);
    background-color: rgba(0, 122, 204, 0.1);
  }
  .element-bbox.selected {
    border-color: #007acc;
    background-color: rgba(0, 122, 204, 0.15);
  }
  .element-tooltip {
    position: absolute;
    background: rgba(0, 0, 0, 0.85);
    color: #fff;
    font-size: 11px;
    font-family: monospace;
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
    transform: translateY(-100%) translateY(-4px);
  }

  /* ── Multi-preview grid ── */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    padding: 12px;
    width: 100%;
    overflow-y: auto;
    align-items: start;
  }

  .preview-grid-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .preview-grid-header {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    white-space: nowrap;
  }

  .preview-grid-canvas {
    position: relative;
    display: inline-block;
  }

  .preview-grid-canvas img {
    display: block;
    max-width: 100%;
    max-height: 60vh;
    object-fit: contain;
    border: 1px solid #333;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  .preview-grid-error {
    font-size: 11px;
    color: #f48771;
    background: rgba(50, 10, 10, 0.85);
    border: 1px solid #f44747;
    border-radius: 4px;
    padding: 8px 12px;
    max-width: 100%;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Status bar ── */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 12px;
    background: #252526;
    border-top: 1px solid #3c3c3c;
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
  }

  /* ── High Contrast theme support ── */
  body.vscode-high-contrast {
    background: #000000;
    color: #ffffff;
  }

  body.vscode-high-contrast .toolbar {
    background: #000000;
    border-bottom: 1px solid #ffffff;
  }

  body.vscode-high-contrast .toolbar label {
    color: #ffffff;
  }

  body.vscode-high-contrast .toolbar select,
  body.vscode-high-contrast .toolbar input[type="number"] {
    background: #000000;
    color: #ffffff;
    border-color: #ffffff;
  }

  body.vscode-high-contrast .toolbar-separator {
    background: #ffffff;
  }

  body.vscode-high-contrast .toolbar button {
    background: #000000;
    color: #ffffff;
    border-color: #ffffff;
  }

  body.vscode-high-contrast .toolbar button:hover {
    background: #1a1a1a;
  }

  body.vscode-high-contrast .toolbar button:active {
    background: #0078d4;
  }

  body.vscode-high-contrast .status-bar {
    background: #000000;
    border-top: 1px solid #ffffff;
    color: #ffffff;
  }

  body.vscode-high-contrast-light {
    background: #ffffff;
    color: #000000;
  }

  body.vscode-high-contrast-light .toolbar {
    background: #ffffff;
    border-bottom: 1px solid #000000;
  }

  body.vscode-high-contrast-light .toolbar label {
    color: #000000;
  }

  body.vscode-high-contrast-light .toolbar select,
  body.vscode-high-contrast-light .toolbar input[type="number"] {
    background: #ffffff;
    color: #000000;
    border-color: #000000;
  }

  body.vscode-high-contrast-light .toolbar button {
    background: #ffffff;
    color: #000000;
    border-color: #000000;
  }

  /* ── Inspector layout wrapper ── */
  #contentRow {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
  }

  #contentLeft {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Inspector panel ── */
  .inspector-panel {
    width: 280px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #252526;
    border-left: 1px solid #3c3c3c;
    overflow: hidden;
  }

  .inspector-header {
    padding: 6px 10px;
    font-size: 11px;
    color: #aaa;
    background: #2d2d2d;
    border-bottom: 1px solid #3c3c3c;
    flex-shrink: 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .tree-view {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    min-height: 100px;
    max-height: 55%;
  }

  .tree-node {
    display: flex;
    align-items: center;
    padding: 2px 0;
    cursor: pointer;
    font-size: 12px;
    color: #cccccc;
    white-space: nowrap;
  }

  .tree-node:hover {
    background: rgba(255, 255, 255, 0.06);
  }

  .tree-node.selected {
    background: rgba(0, 122, 204, 0.25);
    color: #fff;
  }

  .tree-node-toggle {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    color: #888;
    font-size: 9px;
    user-select: none;
  }

  .tree-node-label {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tree-node-type {
    color: #4ec9b0;
  }

  .tree-node-name {
    color: #888;
    font-size: 11px;
  }

  .tree-children.collapsed {
    display: none;
  }

  .property-panel {
    overflow-y: auto;
    padding: 4px 0;
    border-top: 1px solid #3c3c3c;
    font-size: 12px;
    min-height: 80px;
    flex: 1;
  }

  .property-placeholder {
    color: #666;
    font-size: 11px;
    padding: 8px 10px;
    text-align: center;
  }

  .property-row {
    display: flex;
    align-items: center;
    padding: 2px 10px;
    gap: 6px;
  }

  .property-key {
    color: #9cdcfe;
    font-size: 11px;
    min-width: 68px;
    flex-shrink: 0;
  }

  .property-value {
    color: #ce9178;
    font-size: 11px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .property-value.bool-true { color: #4ec9b0; }
  .property-value.bool-false { color: #f48771; }

  .property-value.readonly {
    color: #666;
    font-style: italic;
  }

  .prop-input {
    background: #3c3c3c;
    color: #ce9178;
    border: 1px solid #555;
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 11px;
    font-family: inherit;
    outline: none;
    flex: 1;
    min-width: 0;
  }

  .prop-input:focus {
    border-color: #007acc;
    color: #ffffff;
  }

  .prop-input[type="number"] {
    width: 60px;
    flex: none;
  }

  .prop-input[type="range"] {
    flex: 1;
    height: 14px;
    accent-color: #007acc;
    padding: 0;
  }

  .prop-input[type="color"] {
    width: 28px;
    height: 18px;
    padding: 0 2px;
    border-radius: 2px;
    cursor: pointer;
    flex: none;
  }

  .prop-input[type="checkbox"] {
    width: 14px;
    height: 14px;
    accent-color: #007acc;
    cursor: pointer;
    flex: none;
  }

  .prop-opacity-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 0;
  }

  .prop-opacity-label {
    font-size: 11px;
    color: #ce9178;
    width: 28px;
    flex-shrink: 0;
    text-align: right;
  }

  .btn-inspector {
    font-size: 13px;
    padding: 2px 8px;
  }

  .btn-inspector.active {
    background: #0e639c;
    border-color: #007acc;
  }

  /* ── VNC interactive mode ── */
  .btn-vnc {
    font-size: 14px;
    padding: 2px 8px;
  }

  .btn-vnc.active {
    background: #0e639c;
    border-color: #007acc;
    color: #ffffff;
  }

  .vnc-container {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: auto;
    background: #000;
  }

  .vnc-container canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .vnc-status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #cccccc;
    background: rgba(0, 0, 0, 0.75);
    padding: 8px 18px;
    border-radius: 4px;
    font-size: 13px;
    white-space: nowrap;
    pointer-events: none;
  }

  .vnc-reload-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cccccc;
    font-size: 13px;
    z-index: 10;
  }
</style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <label for="preset">Resolution:</label>
    <select id="preset">
      <option value="1024x600">1024 x 600</option>
      <option value="720x1280">720 x 1280</option>
      <option value="360x640">360 x 640</option>
      <option value="1920x1080">1920 x 1080</option>
      <option value="480x800">480 x 800</option>
      <option value="custom">Custom</option>
    </select>

    <div class="toolbar-separator"></div>

    <label for="inputWidth">W:</label>
    <input type="number" id="inputWidth" min="1" max="7680" value="1024">
    <span class="dim-times">&times;</span>
    <label for="inputHeight">H:</label>
    <input type="number" id="inputHeight" min="1" max="4320" value="600">

    <div id="customSizeInputs" class="custom-size-inputs">
    </div>

    <div class="toolbar-separator"></div>

    <button id="btnRefresh" class="btn-refresh" title="Refresh preview">&#x21bb;</button>

    <div class="toolbar-separator"></div>

    <button id="btnTheme" class="btn-theme" title="Toggle dark/light theme">&#x1F319;</button>

    <div class="toolbar-separator"></div>

    <button id="btnBgColor" class="btn-bg-color" title="배경색 선택 (Background color)"></button>

    <div class="toolbar-separator"></div>

    <button id="btnInspector" class="btn-inspector" title="Widget Inspector 토글">&#x1F50D;</button>

    <div class="toolbar-separator" id="vncSeparator" style="display:none;"></div>
    <button id="btnVnc" class="btn-vnc" title="인터랙티브 모드 전환 (VNC)" style="display:none;">&#x1F5A5;</button>
  </div>

  <!-- Background color picker popup -->
  <div id="colorPickerPopup" class="color-picker-popup hidden">
    <div class="cp-row">
      <input type="color" id="cpNative" class="cp-native" value="#1a1a2e">
      <span class="cp-title">배경색</span>
    </div>
    <div class="cp-row">
      <label>HEX</label>
      <input type="text" id="cpHex" class="cp-hex" value="#1a1a2e" maxlength="7" spellcheck="false" autocomplete="off">
    </div>
    <div class="cp-row">
      <label>R</label>
      <input type="number" id="cpR" class="cp-rgb" min="0" max="255" value="26">
      <label>G</label>
      <input type="number" id="cpG" class="cp-rgb" min="0" max="255" value="26">
      <label>B</label>
      <input type="number" id="cpB" class="cp-rgb" min="0" max="255" value="46">
    </div>
    <button id="cpReset" class="cp-reset">기본값으로 초기화</button>
  </div>

  <!-- Content row: preview (left) + inspector (right) -->
  <div id="contentRow">
    <div id="contentLeft">

      <!-- Multi-preview grid (hidden when unused) -->
      <div class="preview-grid hidden" id="previewGrid"></div>

      <!-- Main preview area -->
      <div class="preview-area" id="previewArea">
        <!-- Image container -->
        <div class="preview-container bg-dark" id="previewContainer">
          <img id="previewImage" class="hidden" alt="DALi Preview" draggable="false">
          <div id="elementOverlay" class="element-overlay"></div>
          <div class="resize-handle" id="resizeHandle"></div>
          <div class="resize-outline" id="resizeOutline"></div>
          <div class="resize-dimensions" id="resizeDimensions"></div>
          <div class="dimensions-label hidden" id="dimensionsLabel"></div>
        </div>

        <!-- VNC container (shown in interactive mode) -->
        <div id="vncContainer" class="vnc-container hidden">
          <div id="vncStatus" class="vnc-status">연결 중...</div>
        </div>

        <!-- Overlays -->
        <div class="overlay overlay-loading hidden" id="overlayLoading">
          <div class="spinner"></div>
        </div>

        <div class="overlay overlay-error hidden" id="overlayError">
          <div class="error-box">
            <h3>Preview Error</h3>
            <pre id="errorText"></pre>
          </div>
        </div>

        <div class="overlay overlay-welcome" id="overlayWelcome">
          <div class="welcome-box">
            <h2>DALi Preview</h2>
            <p>Save a <code>.preview.dali.cpp</code> file to see preview</p>
          </div>
        </div>
      </div>

    </div><!-- #contentLeft -->

    <!-- Inspector panel (hidden by default) -->
    <div id="inspectorPanel" class="inspector-panel hidden">
      <div class="inspector-header">Widget Inspector</div>
      <div id="treeView" class="tree-view"></div>
      <div id="propertyPanel" class="property-panel">
        <p class="property-placeholder">노드를 선택하세요</p>
      </div>
    </div>
  </div><!-- #contentRow -->

  <!-- Status bar -->
  <div class="status-bar">
    <span id="buildTimeText"></span>
    <span id="timestampText"></span>
  </div>

<script src="{{rfbScriptUri}}"></script>
<script>
(function () {
  var vscode = acquireVsCodeApi();

  // ── Elements ──
  var preset = document.getElementById('preset');
  var inputWidth = document.getElementById('inputWidth');
  var inputHeight = document.getElementById('inputHeight');
  var btnRefresh = document.getElementById('btnRefresh');
  var btnTheme = document.getElementById('btnTheme');
  var previewArea = document.getElementById('previewArea');
  var previewContainer = document.getElementById('previewContainer');
  var previewImage = document.getElementById('previewImage');
  var resizeHandle = document.getElementById('resizeHandle');
  var resizeOutline = document.getElementById('resizeOutline');
  var resizeDimensions = document.getElementById('resizeDimensions');
  var dimensionsLabel = document.getElementById('dimensionsLabel');
  var overlayLoading = document.getElementById('overlayLoading');
  var overlayError = document.getElementById('overlayError');
  var overlayWelcome = document.getElementById('overlayWelcome');
  var errorText = document.getElementById('errorText');
  var buildTimeText = document.getElementById('buildTimeText');
  var timestampText = document.getElementById('timestampText');
  var previewGrid = document.getElementById('previewGrid');
  var btnBgColor = document.getElementById('btnBgColor');
  var colorPickerPopup = document.getElementById('colorPickerPopup');
  var btnVnc = document.getElementById('btnVnc');
  var vncSeparator = document.getElementById('vncSeparator');
  var vncContainer = document.getElementById('vncContainer');
  var vncStatus = document.getElementById('vncStatus');
  var cpNative = document.getElementById('cpNative');
  var cpHex = document.getElementById('cpHex');
  var cpR = document.getElementById('cpR');
  var cpG = document.getElementById('cpG');
  var cpB = document.getElementById('cpB');
  var cpReset = document.getElementById('cpReset');

  // ── State ──
  var currentBg = 'dark';
  var bgCycle = ['dark', 'light', 'checker'];
  var currentTheme = 'dark';
  var resizeDebounceTimer = null;
  var currentWidth = 1024;
  var currentHeight = 600;

  // VNC state
  var rfbClient = null;
  var vncMode = false;

  // ── Presets ──
  var presets = {
    '1024x600': [1024, 600],
    '720x1280': [720, 1280],
    '360x640': [360, 640],
    '1920x1080': [1920, 1080],
    '480x800': [480, 800]
  };

  function applyPreset() {
    var val = preset.value;
    if (val !== 'custom' && presets[val]) {
      currentWidth = presets[val][0];
      currentHeight = presets[val][1];
      inputWidth.value = currentWidth;
      inputHeight.value = currentHeight;
    }
  }

  preset.addEventListener('change', function () {
    applyPreset();
    sendResize(currentWidth, currentHeight);
  });

  function onManualSizeChange() {
    var w = parseInt(inputWidth.value, 10);
    var h = parseInt(inputHeight.value, 10);
    if (w > 0 && h > 0) {
      currentWidth = w;
      currentHeight = h;
      // Check if matches a preset
      var matched = false;
      var keys = Object.keys(presets);
      for (var i = 0; i < keys.length; i++) {
        if (presets[keys[i]][0] === w && presets[keys[i]][1] === h) {
          preset.value = keys[i];
          matched = true;
          break;
        }
      }
      if (!matched) {
        preset.value = 'custom';
      }
      sendResize(w, h);
    }
  }

  inputWidth.addEventListener('change', onManualSizeChange);
  inputHeight.addEventListener('change', onManualSizeChange);

  // ── Refresh ──
  btnRefresh.addEventListener('click', function () {
    vscode.postMessage({ command: 'refresh' });
  });

  // ── VNC toggle ──
  btnVnc.addEventListener('click', function () {
    if (vncMode) {
      vscode.postMessage({ command: 'stopVnc' });
    } else {
      vscode.postMessage({ command: 'startVnc' });
    }
  });

  function startVncClient(wsUrl) {
    if (rfbClient) {
      rfbClient.disconnect();
      rfbClient = null;
    }
    vncStatus.textContent = '연결 중...';
    vncStatus.style.display = '';
    if (typeof RFB === 'undefined') {
      vncStatus.textContent = 'RFB 클라이언트를 로드할 수 없습니다';
      return;
    }
    rfbClient = new RFB(vncContainer, wsUrl);
    rfbClient.scaleViewport = true;
    rfbClient.addEventListener('connect', function () {
      vncStatus.style.display = 'none';
      vscode.postMessage({ command: 'vncConnected' });
    });
    rfbClient.addEventListener('disconnect', function (e) {
      vncStatus.textContent = '연결 끊김: ' + (e.detail && e.detail.reason ? e.detail.reason : '알 수 없는 이유');
      vncStatus.style.display = '';
      vscode.postMessage({ command: 'vncDisconnected', reason: (e.detail && e.detail.reason) || '' });
    });
  }

  function stopVncClient() {
    if (rfbClient) {
      rfbClient.disconnect();
      rfbClient = null;
    }
  }

  // ── Background color picker ──
  var DEFAULT_BG_COLOR = '#1a1a2e';
  var currentBgColor = DEFAULT_BG_COLOR;

  function isValidHex(hex) {
    return /^#[0-9a-fA-F]{6}$/.test(hex);
  }

  function hexToRgb(hex) {
    return {
      r: parseInt(hex.slice(1, 3), 16),
      g: parseInt(hex.slice(3, 5), 16),
      b: parseInt(hex.slice(5, 7), 16)
    };
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(function (v) {
      return Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2, '0');
    }).join('');
  }

  function applyBgColor(hex) {
    currentBgColor = hex;
    previewContainer.style.background = hex;
    btnBgColor.style.backgroundColor = hex;
    vscode.postMessage({ command: 'changeBackground', color: hex });
  }

  function syncControlsFromHex(hex) {
    cpNative.value = hex;
    cpHex.value = hex;
    cpHex.classList.remove('invalid');
    var rgb = hexToRgb(hex);
    cpR.value = rgb.r;
    cpG.value = rgb.g;
    cpB.value = rgb.b;
  }

  // Initialize button color
  btnBgColor.style.backgroundColor = DEFAULT_BG_COLOR;

  // Toggle popup
  btnBgColor.addEventListener('click', function (e) {
    e.stopPropagation();
    if (colorPickerPopup.classList.contains('hidden')) {
      var rect = btnBgColor.getBoundingClientRect();
      colorPickerPopup.style.top = (rect.bottom + 4) + 'px';
      colorPickerPopup.style.left = rect.left + 'px';
      colorPickerPopup.classList.remove('hidden');
    } else {
      colorPickerPopup.classList.add('hidden');
    }
  });

  // Close popup when clicking outside
  document.addEventListener('click', function (e) {
    if (!colorPickerPopup.classList.contains('hidden') &&
        !colorPickerPopup.contains(e.target) &&
        e.target !== btnBgColor) {
      colorPickerPopup.classList.add('hidden');
    }
  });

  // Close on Escape
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      colorPickerPopup.classList.add('hidden');
    }
  });

  // Native color wheel input
  cpNative.addEventListener('input', function () {
    var hex = cpNative.value;
    if (isValidHex(hex)) {
      syncControlsFromHex(hex);
      applyBgColor(hex);
    }
  });

  // HEX text input
  cpHex.addEventListener('input', function () {
    var hex = cpHex.value;
    if (isValidHex(hex)) {
      cpHex.classList.remove('invalid');
      cpNative.value = hex;
      var rgb = hexToRgb(hex);
      cpR.value = rgb.r;
      cpG.value = rgb.g;
      cpB.value = rgb.b;
      applyBgColor(hex);
    } else {
      cpHex.classList.add('invalid');
    }
  });

  cpHex.addEventListener('blur', function () {
    if (!isValidHex(cpHex.value)) {
      cpHex.value = currentBgColor;
      cpHex.classList.remove('invalid');
    }
  });

  // RGB number inputs
  function onRgbChange() {
    var r = parseInt(cpR.value, 10);
    var g = parseInt(cpG.value, 10);
    var b = parseInt(cpB.value, 10);
    if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
      var hex = rgbToHex(r, g, b);
      cpNative.value = hex;
      cpHex.value = hex;
      cpHex.classList.remove('invalid');
      applyBgColor(hex);
    }
  }

  cpR.addEventListener('input', onRgbChange);
  cpG.addEventListener('input', onRgbChange);
  cpB.addEventListener('input', onRgbChange);

  // Reset button
  cpReset.addEventListener('click', function () {
    syncControlsFromHex(DEFAULT_BG_COLOR);
    applyBgColor(DEFAULT_BG_COLOR);
  });

  // ── Theme toggle ──
  function applyThemeButton(theme) {
    currentTheme = theme;
    if (theme === 'light') {
      btnTheme.textContent = '\u2600\uFE0F'; // ☀️
      btnTheme.classList.add('theme-light');
      btnTheme.title = 'Switch to dark theme';
    } else {
      btnTheme.textContent = '\uD83C\uDF19'; // 🌙
      btnTheme.classList.remove('theme-light');
      btnTheme.title = 'Switch to light theme';
    }
  }

  btnTheme.addEventListener('click', function () {
    vscode.postMessage({ command: 'toggleTheme' });
  });

  // ── Resize via debounced postMessage ──
  function sendResize(w, h) {
    if (resizeDebounceTimer) {
      clearTimeout(resizeDebounceTimer);
    }
    resizeDebounceTimer = setTimeout(function () {
      vscode.postMessage({ command: 'resize', width: w, height: h });
    }, 300);
  }

  // ── Drag resize handle ──
  var isDragging = false;
  var dragStartX = 0;
  var dragStartY = 0;
  var dragStartW = 0;
  var dragStartH = 0;

  resizeHandle.addEventListener('mousedown', function (e) {
    e.preventDefault();
    e.stopPropagation();
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    var rect = previewImage.getBoundingClientRect();
    dragStartW = rect.width;
    dragStartH = rect.height;
    resizeOutline.classList.add('active');
    resizeDimensions.classList.add('active');
    document.body.style.cursor = 'nwse-resize';
  });

  document.addEventListener('mousemove', function (e) {
    if (!isDragging) { return; }
    var dx = e.clientX - dragStartX;
    var dy = e.clientY - dragStartY;
    var newW = Math.max(32, Math.round(dragStartW + dx));
    var newH = Math.max(32, Math.round(dragStartH + dy));

    resizeOutline.style.width = newW + 'px';
    resizeOutline.style.height = newH + 'px';

    resizeDimensions.textContent = newW + ' x ' + newH;
    resizeDimensions.style.left = (newW + 8) + 'px';
    resizeDimensions.style.top = (newH - 4) + 'px';
  });

  document.addEventListener('mouseup', function () {
    if (!isDragging) { return; }
    isDragging = false;
    document.body.style.cursor = '';
    resizeOutline.classList.remove('active');
    resizeDimensions.classList.remove('active');

    var outlineW = parseInt(resizeOutline.style.width, 10);
    var outlineH = parseInt(resizeOutline.style.height, 10);
    if (outlineW > 0 && outlineH > 0) {
      currentWidth = outlineW;
      currentHeight = outlineH;
      inputWidth.value = currentWidth;
      inputHeight.value = currentHeight;
      preset.value = 'custom';
      sendResize(currentWidth, currentHeight);
    }
  });

  // ── Click-to-Code ──
  var elementOverlay = document.getElementById('elementOverlay');
  var currentMetadata = null;
  var selectedBbox = null;
  var activeTooltip = null;
  elementOverlay.classList.add('interactive');

  function clearInspectSelection() {
    if (selectedBbox) {
      selectedBbox.classList.remove('selected');
      selectedBbox = null;
    }
    hideInspectTooltip();
  }

  function hideInspectTooltip() {
    if (activeTooltip) {
      activeTooltip.remove();
      activeTooltip = null;
    }
  }

  function showInspectTooltip(bboxDiv, text) {
    hideInspectTooltip();
    activeTooltip = document.createElement('div');
    activeTooltip.className = 'element-tooltip';
    activeTooltip.textContent = text;
    activeTooltip.style.left = bboxDiv.style.left;
    activeTooltip.style.top = bboxDiv.style.top;
    elementOverlay.appendChild(activeTooltip);
  }

  function renderMetadataOverlayInto(img, overlayEl, metadata) {
    overlayEl.innerHTML = '';
    if (!metadata || !metadata.root) return;
    if (!img || !img.naturalWidth) return;

    var scaleX = img.clientWidth / img.naturalWidth;
    var scaleY = img.clientHeight / img.naturalHeight;

    var containerRect = overlayEl.parentElement.getBoundingClientRect();
    var imgRect = img.getBoundingClientRect();
    var offsetX = imgRect.left - containerRect.left;
    var offsetY = imgRect.top - containerRect.top;

    function renderActor(actor) {
      if (actor.name && actor.name.indexOf('__L') === 0) {
        var lineNum = parseInt(actor.name.substring(3), 10);
        var div = document.createElement('div');
        div.className = 'element-bbox';
        div.style.left = (actor.x * scaleX + offsetX) + 'px';
        div.style.top = (actor.y * scaleY + offsetY) + 'px';
        div.style.width = (actor.w * scaleX) + 'px';
        div.style.height = (actor.h * scaleY) + 'px';
        div.dataset.line = lineNum;

        div.addEventListener('click', (function(ln, d) { return function (e) {
          e.stopPropagation();
          clearInspectSelection();
          selectedBbox = d;
          d.classList.add('selected');
          vscode.postMessage({ command: 'selectElement', line: ln });
          highlightTreeByLine(ln);
        }; })(lineNum, div));

        div.addEventListener('mouseenter', function () {
          showInspectTooltip(div, 'Line ' + (lineNum + 1));
        });

        div.addEventListener('mouseleave', function () {
          hideInspectTooltip();
        });

        overlayEl.appendChild(div);
      }

      if (actor.children) {
        for (var i = 0; i < actor.children.length; i++) {
          renderActor(actor.children[i]);
        }
      }
    }

    renderActor(metadata.root);

    var boxes = Array.from(overlayEl.querySelectorAll('.element-bbox'));
    boxes.sort(function (a, b) {
      return (b.offsetWidth * b.offsetHeight) - (a.offsetWidth * a.offsetHeight);
    });
    boxes.forEach(function (box) { overlayEl.appendChild(box); });
  }

  function renderMetadataOverlay(metadata) {
    currentMetadata = metadata;
    renderMetadataOverlayInto(previewImage, elementOverlay, metadata);
  }

  // Re-render overlay when image resizes
  if (previewImage && typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(function () {
      if (currentMetadata) {
        renderMetadataOverlay(currentMetadata);
      }
    }).observe(previewImage);
  }

  // ── Inspector ──
  var btnInspector = document.getElementById('btnInspector');
  var inspectorPanel = document.getElementById('inspectorPanel');
  var treeViewEl = document.getElementById('treeView');
  var propertyPanelEl = document.getElementById('propertyPanel');
  var inspectorVisible = false;
  var lineToTreeNode = {};
  var selectedTreeNodeEl = null;

  function setInspectorVisible(visible) {
    inspectorVisible = visible;
    if (visible) {
      inspectorPanel.classList.remove('hidden');
      btnInspector.classList.add('active');
      if (currentMetadata) {
        renderTreeView(currentMetadata);
      }
    } else {
      inspectorPanel.classList.add('hidden');
      btnInspector.classList.remove('active');
    }
  }

  btnInspector.addEventListener('click', function () {
    var next = !inspectorVisible;
    setInspectorVisible(next);
    vscode.postMessage({ command: 'inspectorToggle', visible: next });
  });

  // Convert [r, g, b, a] (0-1 floats) to '#rrggbb' for color input
  function rgbaArrayToHex(arr) {
    if (!Array.isArray(arr) || arr.length < 3) return '#000000';
    var r = Math.round(Math.max(0, Math.min(1, arr[0])) * 255);
    var g = Math.round(Math.max(0, Math.min(1, arr[1])) * 255);
    var b = Math.round(Math.max(0, Math.min(1, arr[2])) * 255);
    return '#' + [r, g, b].map(function(c) { return c.toString(16).padStart(2, '0'); }).join('');
  }

  // Convert '#rrggbb' to 'UiColor(0xRRGGBB)' for DALi source.
  // This matches the canonical style used in DALi sample files.
  // alpha is ignored here — UiColor(0xRRGGBB) encodes only RGB;
  // full-alpha variants use UiColor(0xRRGGBBAA) which is not yet needed.
  function hexToUiColor(hex) {
    var r = hex.slice(1, 3).toUpperCase();
    var g = hex.slice(3, 5).toUpperCase();
    var b = hex.slice(5, 7).toUpperCase();
    return 'UiColor(0x' + r + g + b + ')';
  }

  function renderPropertyPanel(node) {
    propertyPanelEl.innerHTML = '';
    if (!node) {
      propertyPanelEl.innerHTML = '<p class="property-placeholder">노드를 선택하세요</p>';
      return;
    }

    // Determine source line for edit mapping (__L<line> convention)
    var sourceLine = -1;
    if (node.name && node.name.indexOf('__L') === 0) {
      sourceLine = parseInt(node.name.substring(3), 10);
    }
    var canEdit = sourceLine >= 0;

    function addReadOnlyRow(key, value, extraClass) {
      var row = document.createElement('div');
      row.className = 'property-row';
      var k = document.createElement('span');
      k.className = 'property-key';
      k.textContent = key;
      var v = document.createElement('span');
      v.className = 'property-value readonly' + (extraClass ? ' ' + extraClass : '');
      v.textContent = String(value);
      v.title = String(value);
      row.appendChild(k);
      row.appendChild(v);
      propertyPanelEl.appendChild(row);
    }

    function addNumberRow(key, value, propName) {
      var row = document.createElement('div');
      row.className = 'property-row';
      var k = document.createElement('span');
      k.className = 'property-key';
      k.textContent = key;
      row.appendChild(k);
      var input = document.createElement('input');
      input.type = 'number';
      input.className = 'prop-input';
      input.value = String(value);
      input.addEventListener('change', function() {
        vscode.postMessage({ command: 'editProperty', sourceLine: sourceLine, propName: propName, value: input.value });
      });
      row.appendChild(input);
      propertyPanelEl.appendChild(row);
    }

    function addBoolRow(key, value, propName) {
      var row = document.createElement('div');
      row.className = 'property-row';
      var k = document.createElement('span');
      k.className = 'property-key';
      k.textContent = key;
      row.appendChild(k);
      var input = document.createElement('input');
      input.type = 'checkbox';
      input.className = 'prop-input';
      input.checked = !!value;
      input.addEventListener('change', function() {
        vscode.postMessage({ command: 'editProperty', sourceLine: sourceLine, propName: propName, value: input.checked ? 'true' : 'false' });
      });
      row.appendChild(input);
      propertyPanelEl.appendChild(row);
    }

    function addOpacityRow(key, value, propName) {
      var row = document.createElement('div');
      row.className = 'property-row';
      var k = document.createElement('span');
      k.className = 'property-key';
      k.textContent = key;
      row.appendChild(k);
      var wrap = document.createElement('div');
      wrap.className = 'prop-opacity-wrap';
      var slider = document.createElement('input');
      slider.type = 'range';
      slider.className = 'prop-input';
      slider.min = '0';
      slider.max = '1';
      slider.step = '0.01';
      var numVal = parseFloat(value);
      slider.value = String(isNaN(numVal) ? 1 : numVal);
      var label = document.createElement('span');
      label.className = 'prop-opacity-label';
      label.textContent = slider.value;
      slider.addEventListener('input', function() {
        label.textContent = parseFloat(slider.value).toFixed(2);
      });
      slider.addEventListener('change', function() {
        var v = parseFloat(slider.value).toFixed(4) + 'f';
        label.textContent = parseFloat(slider.value).toFixed(2);
        vscode.postMessage({ command: 'editProperty', sourceLine: sourceLine, propName: propName, value: v });
      });
      wrap.appendChild(slider);
      wrap.appendChild(label);
      row.appendChild(wrap);
      propertyPanelEl.appendChild(row);
    }

    function addColorRow(key, colorArr, propName) {
      var row = document.createElement('div');
      row.className = 'property-row';
      var k = document.createElement('span');
      k.className = 'property-key';
      k.textContent = key;
      row.appendChild(k);
      var input = document.createElement('input');
      input.type = 'color';
      input.className = 'prop-input';
      input.value = rgbaArrayToHex(colorArr);
      var colorDebounceTimer = null;
      input.addEventListener('change', function() {
        clearTimeout(colorDebounceTimer);
        colorDebounceTimer = setTimeout(function() {
          var uiColor = hexToUiColor(input.value);
          vscode.postMessage({ command: 'editProperty', sourceLine: sourceLine, propName: propName, value: uiColor });
        }, 100);
      });
      row.appendChild(input);
      propertyPanelEl.appendChild(row);
    }

    // type and name are always read-only (structural, not editable via setter)
    if (node.type) { addReadOnlyRow('type', node.type); }
    if (node.name) { addReadOnlyRow('name', node.name); }

    if (canEdit) {
      // Use localX/localY (local position, not screen coordinates) for SetPosition() editing (H4)
      addNumberRow('x', Math.round(node.localX !== undefined ? node.localX : (node.x || 0)), 'x');
      addNumberRow('y', Math.round(node.localY !== undefined ? node.localY : (node.y || 0)), 'y');
      addNumberRow('w', Math.round(node.w || 0), 'w');
      addNumberRow('h', Math.round(node.h || 0), 'h');
      if (node.visible !== undefined) {
        addBoolRow('visible', node.visible, 'visible');
      }
      if (node.opacity !== undefined) {
        addOpacityRow('opacity', node.opacity, 'opacity');
      }
      if (node.properties && node.properties.color) {
        addColorRow('color', node.properties.color, 'color');
      }
    } else {
      addReadOnlyRow('x', Math.round(node.x || 0));
      addReadOnlyRow('y', Math.round(node.y || 0));
      addReadOnlyRow('w', Math.round(node.w || 0));
      addReadOnlyRow('h', Math.round(node.h || 0));
      if (node.visible !== undefined) {
        addReadOnlyRow('visible', node.visible, node.visible ? 'bool-true' : 'bool-false');
      }
      if (node.opacity !== undefined) {
        addReadOnlyRow('opacity', node.opacity.toFixed ? node.opacity.toFixed(2) : node.opacity);
      }
      if (node.properties) {
        var keys = Object.keys(node.properties);
        for (var pi = 0; pi < keys.length; pi++) {
          addReadOnlyRow(keys[pi], node.properties[keys[pi]]);
        }
      }
    }
  }

  function selectInspectorNode(nodeEl, nodeData) {
    if (selectedTreeNodeEl) {
      selectedTreeNodeEl.classList.remove('selected');
    }
    selectedTreeNodeEl = nodeEl;
    if (nodeEl) {
      nodeEl.classList.add('selected');
      nodeEl.scrollIntoView({ block: 'nearest' });
    }
    renderPropertyPanel(nodeData);

    // Highlight corresponding bounding box in preview
    var bboxes = elementOverlay.querySelectorAll('.element-bbox');
    for (var bi = 0; bi < bboxes.length; bi++) {
      bboxes[bi].classList.remove('selected');
    }
    if (nodeData && nodeData.name && nodeData.name.indexOf('__L') === 0) {
      var lineNum = parseInt(nodeData.name.substring(3), 10);
      var matchBox = elementOverlay.querySelector('.element-bbox[data-line="' + lineNum + '"]');
      if (matchBox) {
        selectedBbox = matchBox;
        matchBox.classList.add('selected');
      }
    }
  }

  function buildTreeNode(node, depth) {
    var wrapper = document.createElement('div');

    var nodeEl = document.createElement('div');
    nodeEl.className = 'tree-node';
    nodeEl.style.paddingLeft = (depth * 14 + 4) + 'px';

    var hasChildren = node.children && node.children.length > 0;

    var toggleEl = document.createElement('span');
    toggleEl.className = 'tree-node-toggle';
    toggleEl.textContent = hasChildren ? '\u25BC' : '';
    nodeEl.appendChild(toggleEl);

    var labelEl = document.createElement('span');
    labelEl.className = 'tree-node-label';

    var typeSpan = document.createElement('span');
    typeSpan.className = 'tree-node-type';
    typeSpan.textContent = node.type || node.name || 'Actor';
    labelEl.appendChild(typeSpan);

    if (node.name && node.name !== node.type) {
      var nameSpan = document.createElement('span');
      nameSpan.className = 'tree-node-name';
      nameSpan.textContent = '(' + node.name + ')';
      labelEl.appendChild(nameSpan);
    }
    nodeEl.appendChild(labelEl);
    wrapper.appendChild(nodeEl);

    // Track line-tagged nodes
    if (node.name && node.name.indexOf('__L') === 0) {
      var lineNum = parseInt(node.name.substring(3), 10);
      lineToTreeNode[lineNum] = { el: nodeEl, data: node };
    }

    var childrenEl = null;
    if (hasChildren) {
      childrenEl = document.createElement('div');
      childrenEl.className = 'tree-children' + (depth >= 1 ? ' collapsed' : '');
      for (var i = 0; i < node.children.length; i++) {
        childrenEl.appendChild(buildTreeNode(node.children[i], depth + 1));
      }
      wrapper.appendChild(childrenEl);

      toggleEl.addEventListener('click', function (e) {
        e.stopPropagation();
        var collapsed = childrenEl.classList.toggle('collapsed');
        toggleEl.textContent = collapsed ? '\u25B6' : '\u25BC';
      });
    }

    nodeEl.addEventListener('click', function () {
      selectInspectorNode(nodeEl, node);
      // Notify extension for Code-to-Code sync
      if (node.name && node.name.indexOf('__L') === 0) {
        var ln = parseInt(node.name.substring(3), 10);
        vscode.postMessage({ command: 'selectElement', line: ln });
      }
    });

    return wrapper;
  }

  function renderTreeView(metadata) {
    treeViewEl.innerHTML = '';
    lineToTreeNode = {};
    selectedTreeNodeEl = null;
    if (!metadata || !metadata.root) return;

    var rootNode = buildTreeNode(metadata.root, 0);
    treeViewEl.appendChild(rootNode);

    renderPropertyPanel(null);
  }

  function highlightTreeByLine(line) {
    if (!inspectorVisible) return;
    var entry = lineToTreeNode[line];
    if (entry) {
      selectInspectorNode(entry.el, entry.data);
    }
  }

  // ── Message handling ──
  window.addEventListener('message', function (event) {
    var msg = event.data;
    switch (msg.command) {
      case 'updateImage':
        overlayWelcome.classList.add('hidden');
        overlayError.classList.add('hidden');
        overlayLoading.classList.add('hidden');
        previewGrid.classList.add('hidden');
        previewArea.classList.remove('hidden');
        previewImage.classList.remove('hidden');
        dimensionsLabel.classList.remove('hidden');
        previewImage.src = msg.uri + '?t=' + Date.now();
        previewImage.onload = function () {
          dimensionsLabel.textContent = previewImage.naturalWidth + ' x ' + previewImage.naturalHeight;
          if (msg.metadata) {
            renderMetadataOverlay(msg.metadata);
            if (inspectorVisible) {
              renderTreeView(msg.metadata);
            }
          } else {
            elementOverlay.innerHTML = '';
            treeViewEl.innerHTML = '';
          }
        };
        var buildSec = (msg.buildTime / 1000).toFixed(1);
        buildTimeText.textContent = 'Built in ' + buildSec + 's';
        timestampText.textContent = 'Updated: ' + new Date().toLocaleTimeString();
        break;

      case 'showLoading':
        overlayWelcome.classList.add('hidden');
        overlayError.classList.add('hidden');
        overlayLoading.classList.remove('hidden');
        break;

      case 'showError':
        overlayWelcome.classList.add('hidden');
        overlayLoading.classList.add('hidden');
        overlayError.classList.remove('hidden');
        errorText.textContent = msg.message || 'Unknown error';
        // Do NOT hide previewImage — keep last successful render visible behind the banner
        break;

      case 'clearError':
        overlayError.classList.add('hidden');
        break;

      case 'updateMultiImage':
        overlayWelcome.classList.add('hidden');
        overlayError.classList.add('hidden');
        overlayLoading.classList.add('hidden');
        previewArea.classList.add('hidden');
        previewGrid.classList.remove('hidden');
        // Inspector는 단일 프리뷰 모드 전용
        if (inspectorVisible) { setInspectorVisible(false); }
        previewGrid.innerHTML = '';
        var totalBuildTime = 0;
        for (var mi = 0; mi < msg.images.length; mi++) {
          var imgInfo = msg.images[mi];
          totalBuildTime = Math.max(totalBuildTime, imgInfo.buildTime || 0);
          var item = document.createElement('div');
          item.className = 'preview-grid-item';
          var header = document.createElement('div');
          header.className = 'preview-grid-header';
          var sizeLabel = (imgInfo.width && imgInfo.height) ? ' (' + imgInfo.width + '\u00d7' + imgInfo.height + ')' : '';
          header.textContent = imgInfo.name + sizeLabel;
          item.appendChild(header);
          if (!imgInfo.success) {
            var errDiv = document.createElement('div');
            errDiv.className = 'preview-grid-error';
            errDiv.textContent = imgInfo.error || 'Build failed';
            item.appendChild(errDiv);
          } else {
            var canvas = document.createElement('div');
            canvas.className = 'preview-grid-canvas';
            var img = document.createElement('img');
            img.src = imgInfo.uri + '?t=' + Date.now();
            img.alt = imgInfo.name;
            img.draggable = false;
            var overlay = document.createElement('div');
            overlay.className = 'element-overlay interactive';
            (function(imgEl, overlayEl, meta) {
              imgEl.onload = function() {
                if (meta) {
                  renderMetadataOverlayInto(imgEl, overlayEl, meta);
                }
              };
            })(img, overlay, imgInfo.metadata || null);
            canvas.appendChild(img);
            canvas.appendChild(overlay);
            item.appendChild(canvas);
          }
          previewGrid.appendChild(item);
        }
        var buildSec = (totalBuildTime / 1000).toFixed(1);
        buildTimeText.textContent = 'Built in ' + buildSec + 's';
        timestampText.textContent = 'Updated: ' + new Date().toLocaleTimeString();
        break;

      case 'showWelcome':
        overlayLoading.classList.add('hidden');
        overlayError.classList.add('hidden');
        previewImage.classList.add('hidden');
        dimensionsLabel.classList.add('hidden');
        overlayWelcome.classList.remove('hidden');
        previewArea.classList.remove('hidden');
        previewGrid.classList.add('hidden');
        buildTimeText.textContent = '';
        timestampText.textContent = '';
        break;

      case 'setTheme':
        applyThemeButton(msg.theme === 'light' ? 'light' : 'dark');
        break;

      case 'setBackgroundColor':
        if (msg.color && isValidHex(msg.color)) {
          syncControlsFromHex(msg.color);
          applyBgColor(msg.color);
        }
        break;

      case 'highlightElement':
        if (typeof msg.line === 'number') {
          highlightTreeByLine(msg.line);
          // Also highlight bounding box
          var bboxes2 = elementOverlay.querySelectorAll('.element-bbox');
          for (var bhi = 0; bhi < bboxes2.length; bhi++) {
            bboxes2[bhi].classList.remove('selected');
          }
          var targetBox = elementOverlay.querySelector('.element-bbox[data-line="' + msg.line + '"]');
          if (targetBox) {
            selectedBbox = targetBox;
            targetBox.classList.add('selected');
          }
        }
        break;

      case 'setInspectorVisible':
        if (typeof msg.visible === 'boolean') {
          setInspectorVisible(msg.visible);
        }
        break;

      case 'vncAvailable':
        // Show the VNC toggle button
        btnVnc.style.display = '';
        vncSeparator.style.display = '';
        break;

      case 'startVnc': {
        // Switch to VNC mode: hide static preview, show VNC canvas
        previewContainer.style.display = 'none';
        vncContainer.classList.remove('hidden');
        overlayWelcome.classList.add('hidden');
        overlayError.classList.add('hidden');
        overlayLoading.classList.add('hidden');
        btnVnc.classList.add('active');
        btnVnc.title = '정적 모드로 전환';
        vncMode = true;
        startVncClient(msg.wsUrl);
        timestampText.textContent = '인터랙티브 모드';
        break;
      }

      case 'stopVnc': {
        // Switch back to static PNG mode
        stopVncClient();
        vncContainer.classList.add('hidden');
        previewContainer.style.display = '';
        btnVnc.classList.remove('active');
        btnVnc.title = '인터랙티브 모드 전환 (VNC)';
        vncMode = false;
        timestampText.textContent = '';
        break;
      }

      case 'vncReloading': {
        // Show overlay while DALi app restarts
        if (vncMode) {
          var overlay = document.createElement('div');
          overlay.className = 'vnc-reload-overlay';
          overlay.id = 'vncReloadOverlay';
          overlay.textContent = '다시 로딩 중...';
          vncContainer.appendChild(overlay);
        }
        break;
      }

      case 'vncReloaded': {
        var oldOverlay = document.getElementById('vncReloadOverlay');
        if (oldOverlay) {
          oldOverlay.remove();
        }
        if (msg.wsUrl && rfbClient) {
          // Reconnect to updated app
          startVncClient(msg.wsUrl);
        }
        break;
      }
    }
  });

  // Notify extension that webview is ready to receive initial state
  vscode.postMessage({ command: 'webviewReady' });
})();
</script>
